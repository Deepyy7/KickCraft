name: Build KickCraft VST3 (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JUCE 8
        run: git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git C:/JUCE

      - name: Configure CMake
        run: cmake -B build_release -DJUCE_PATH=C:/JUCE -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build_release --config Release --target KickCraft_VST3

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: KickCraft-VST3-Windows
          path: build_release/KickCraft_artefacts/Release/VST3/
