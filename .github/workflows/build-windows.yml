name: Build KickCraft VST3 (Windows)

on:
  workflow_dispatch:   # run manually from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JUCE
        run: |
          git clone --depth 1 --branch 7.0.9 https://github.com/juce-framework/JUCE.git C:/JUCE

      - name: Install WebView2 SDK via NuGet
        run: |
          nuget install Microsoft.Web.WebView2 -Version 1.0.2478.35 -OutputDirectory webview2_nuget
          $sdk = Get-ChildItem -Path webview2_nuget -Filter "Microsoft.Web.WebView2.*" -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path webview2_sdk/build/native/include
          New-Item -ItemType Directory -Force -Path webview2_sdk/build/native/x64
          Copy-Item "$($sdk.FullName)/build/native/include/*" webview2_sdk/build/native/include/ -Recurse
          Copy-Item "$($sdk.FullName)/build/native/x64/WebView2LoaderStatic.lib" webview2_sdk/build/native/x64/
        shell: pwsh

      - name: Patch JUCE for WebView2
        run: |
          $wv2inc = (Get-ChildItem -Path webview2_nuget -Filter "Microsoft.Web.WebView2.*" -Directory | Select-Object -First 1).FullName + "/build/native/include"
          Copy-Item "$wv2inc/WebView2.h" "C:/JUCE/modules/juce_gui_extra/"
          Copy-Item "$wv2inc/WebView2EnvironmentOptions.h" "C:/JUCE/modules/juce_gui_extra/"
          $file = "C:/JUCE/modules/juce_gui_extra/juce_gui_extra.h"
          (Get-Content $file) -replace '#define JUCE_USE_WIN_WEBVIEW2 0', '#define JUCE_USE_WIN_WEBVIEW2 1' | Set-Content $file
          Write-Host "Patched:"
          Select-String "JUCE_USE_WIN_WEBVIEW2" $file
        shell: pwsh

      - name: Configure CMake
        run: |
          cmake -B build_release `
            -DJUCE_PATH=C:/JUCE `
            -DCMAKE_BUILD_TYPE=Release
        shell: pwsh

      - name: Build VST3
        run: |
          cmake --build build_release --config Release --target KickCraft_VST3
        shell: pwsh

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: KickCraft-VST3-Windows
          path: build_release/KickCraft_artefacts/Release/VST3/
