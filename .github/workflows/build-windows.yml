name: Build KickCraft VST3 (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JUCE 8
        run: git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git C:/JUCE

      - name: Install WebView2 via NuGet
        run: nuget install Microsoft.Web.WebView2 -Version 1.0.3485.44 -OutputDirectory C:/nuget
        shell: pwsh

      - name: Configure CMake
        run: cmake -B build_release -DJUCE_PATH=C:/JUCE -DCMAKE_BUILD_TYPE=Release -DJUCE_WEBVIEW2_PACKAGE_LOCATION=C:/nuget

      - name: Build VST3
        run: cmake --build build_release --config Release --target KickCraft_VST3

      - name: Build Installer
        shell: pwsh
        run: |
          # Install NSIS
          choco install nsis -y
          # Copy VST3 next to NSI script
          Copy-Item -Recurse "build_release\KickCraft_artefacts\Release\VST3\KickCraft.vst3" "installer\KickCraft.vst3"
          # Build installer
          & "C:\Program Files (x86)\NSIS\makensis.exe" "installer\KickCraft.nsi"

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: KickCraft-VST3-Windows
          path: build_release/KickCraft_artefacts/Release/VST3/

      - name: Upload Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KickCraft-Installer-Windows
          path: installer/KickCraft-Setup.exe
