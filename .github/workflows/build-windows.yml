cmake_minimum_required(VERSION 3.22)
project(KickCraft VERSION 1.0.0)

set(CMAKE_CXX_STANDARD 17)
set(CMAKE_CXX_STANDARD_REQUIRED ON)

set(JUCE_PATH "$ENV{HOME}/JUCE" CACHE PATH "Path to JUCE")
add_subdirectory(${JUCE_PATH} JUCE EXCLUDE_FROM_ALL)

juce_add_plugin(KickCraft
    COMPANY_NAME            "Gravitas Audio"
    PLUGIN_MANUFACTURER_CODE GrvA
    PLUGIN_CODE             Kc01
    FORMATS                 VST3 AU
    PRODUCT_NAME            "KickCraft"
    BUNDLE_ID               "com.gravitasaudio.kickcraft"
    IS_SYNTH                FALSE
    NEEDS_MIDI_INPUT        FALSE
    NEEDS_MIDI_OUTPUT       FALSE
    IS_MIDI_EFFECT          FALSE
    EDITOR_WANTS_KEYBOARD_FOCUS FALSE
    VST3_CATEGORIES         "Fx" "EQ" "Dynamics"
    AU_MAIN_TYPE            kAudioUnitType_Effect
    COPY_PLUGIN_AFTER_BUILD TRUE
    NEE
@'
name: Build KickCraft VST3 (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JUCE 8
        run: |
          git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git C:/JUCE

      - name: Configure CMake
        run: |
          cmake -B build_release `
            -DJUCE_PATH=C:/JUCE `
            -DCMAKE_BUILD_TYPE=Release
        shell: pwsh

      - name: Build VST3
        run: |
          cmake --build build_release --config Release --target KickCraft_VST3
        shell: pwsh

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: KickCraft-VST3-Windows
          path: build_release/KickCraft_artefacts/Release/VST3/
